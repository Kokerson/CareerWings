<!doctype html>
<html lang="pl">
  <link rel="stylesheet" href="style.css" />
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formularz pytań</title>
  </head>
  <body>
    <h1 class="main-title">Zadaj mi pytanie</h1>
    <form>
      <label for="question">Zadaj pytanie </label>
      <input
        type="text"
        id="question"
        name="question"
        placeholder="Wpisz swoje pytanie ."
      />
      <br />
      <button type="submit">Wyślij</button>
    </form>
    <h2>Odpowiedź:</h2>
    <div>
      <p>Odpowiedz pojawi sie po wyslaniu pytania</p>
    </div>
  </body>
</html>
